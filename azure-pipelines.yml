trigger:
  branches:
    include:
      - main

variables:
  dockerRegistryServiceConnection: 'WhistleCare-ACR'
  imageRepository: 'whistlecareapp'
  containerRegistry: 'whistlecarecr.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: Deploy to Azure
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: DownloadSecureFile@1
      name: publishProfile
      displayName: Download Publish Profile
      inputs:
        secureFile: publishprofile.pubxml

    - task: AzureRmWebAppDeployment@4
      displayName: Deploy Web App
      inputs:
        ConnectionType: PublishProfile
        PublishProfilePath: $(publishProfile.secureFilePath)
        AppType: webAppContainer
        ImageName: $(containerRegistry)/$(imageRepository):$(tag)
