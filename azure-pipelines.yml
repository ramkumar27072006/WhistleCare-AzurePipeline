trigger:
  branches:
    include:
      - main

variables:
  buildVmImageName: 'ubuntu-latest'
  deployVmImageName: 'windows-latest'
  packageName: 'whistlecare.zip'

stages:
- stage: Build
  displayName: Build package
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(buildVmImageName)
    steps:
    - checkout: self

    - task: NodeTool@0
      displayName: Use Node.js 18
      inputs:
        versionSpec: '18.x'

    - script: npm install --production
      displayName: Install production dependencies

    - task: ArchiveFiles@2
      displayName: Create deployment package
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(packageName)'
        replaceExistingArchive: true

    - publish: '$(Build.ArtifactStagingDirectory)/$(packageName)'
      artifact: drop

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: Deploy to Azure
    pool:
      vmImage: $(deployVmImageName)
    steps:
    - download: current
      artifact: drop

    - task: DownloadSecureFile@1
      name: publishProfile
      displayName: Download Publish Profile
      inputs:
        secureFile: 'publishprofile.pubxml'

    - task: AzureRmWebAppDeployment@4
      displayName: Deploy Web App
      inputs:
        ConnectionType: 'PublishProfile'
        PublishProfilePath: '$(publishProfile.secureFilePath)'
        PublishProfilePassword: '$(PublishProfilePassword)'
        Package: '$(Pipeline.Workspace)/drop/$(packageName)'
